<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuGenAI - Project Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="6" fill="#0f172a"/>
                <path d="M7 6h10 M7 10h10 M7 14h6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>DocuGen<span class="text-blue">AI</span></span>
        </div>
        <div class="nav-links">
            <button class="btn btn-outline" id="nav-dashboard">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Dashboard
            </button>
        </div>
        <div class="powered-by">
            ✨ Powered by AI
        </div>
    </header>

    <main id="app-content">
        <!-- Views will be injected here -->
    </main>

    <!-- Modals -->
    <div id="modal-backdrop" class="modal-backdrop hidden"></div>
    
    <!-- New Workspace Modal -->
    <div id="modal-new-workspace" class="modal hidden">
        <div class="modal-header">
            <h2>New Project Workspace</h2>
            <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
            <form id="form-new-workspace">
                <div class="form-group">
                    <label>Project Title</label>
                    <input type="text" id="ws-title" placeholder="e.g., Enterprise CRM Migration" required>
                </div>
                <div class="form-group">
                    <label>RFP / Terms of Reference <span>Paste full content here</span></label>
                    <textarea id="ws-text-content" placeholder="Paste the full RFP, ToR, or project requirements document here..." rows="8"></textarea>
                </div>
                <div class="form-divider">OR UPLOAD FILE (.pdf, .doc, .docx, .md)</div>
                <div class="form-group">
                    <input type="file" id="ws-file" accept=".pdf,.doc,.docx,.md,.txt">
                </div>
                <button type="submit" class="btn btn-primary w-full">Create Workspace</button>
            </form>
        </div>
    </div>

    <!-- Document View Modal -->
    <div id="modal-view-doc" class="modal modal-lg hidden">
        <div class="modal-header">
            <h2 id="view-doc-title">Document Title</h2>
            <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
            <div class="doc-meta flex justify-between items-center mb-4 pb-4 border-b">
                <div>
                    <span class="badge badge-success">Generated</span>
                    <span class="text-sm text-gray ml-2" id="view-doc-category">Category</span>
                </div>
                <button class="btn btn-outline" id="btn-download-md">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    Download .md
                </button>
            </div>
            <div id="view-doc-content" class="markdown-preview">
                <!-- Markdown content injected here -->
            </div>
        </div>
    </div>

    <!-- Templates -->
    <template id="tpl-dashboard">
        <div class="dashboard-container">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="page-title">Project Intelligence</h1>
                    <p class="page-subtitle">Manage your RFPs and generate comprehensive documentation.</p>
                </div>
                <button class="btn btn-primary" id="btn-new-project">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    New Project
                </button>
            </div>
            <div class="grid-cards" id="workspace-grid">
                <!-- Workspace cards -->
            </div>
        </div>
    </template>

    <template id="tpl-workspace">
        <div class="workspace-container">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <button class="btn btn-link link-back" id="btn-back-dash">&larr; Back to Dashboard</button>
                    <h1 class="page-title" id="ws-page-title">Loading...</h1>
                    <div class="ws-meta flex items-center gap-4 text-sm text-gray mt-2">
                        <span><svg width="14" height="14" class="inline" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> <span id="ws-date"></span></span>
                        <span class="badge rounded border"><svg width="14" height="14" class="inline" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> <span id="ws-progress-text"></span> Documents</span>
                    </div>
                </div>
                <button class="btn btn-outline" id="btn-export-zip">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    Export to ZIP
                </button>
            </div>

            <div class="ws-layout grid">
                <div class="ws-main" id="categories-container">
                    <!-- Categories and doc cards -->
                </div>
                
                <aside class="ws-sidebar">
                    <div class="card source-card">
                        <div class="flex items-center gap-2 font-semibold mb-4 text-dark">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                            Source Material
                        </div>
                        <div class="source-list flex flex-col gap-2 max-h-[250px] overflow-y-auto mb-4" id="ws-source-list">
                            <!-- List of source files -->
                        </div>
                        
                        <div id="ws-drop-zone" class="drop-zone transition-all flex flex-col items-center">
                            <p class="text-sm text-gray mb-1">Drag & drop files here</p>
                            <p class="text-xs text-gray mb-2">or</p>
                            <label class="btn btn-outline text-xs cursor-pointer flex justify-center items-center gap-1 w-full" style="max-width: 150px;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                Add Source File
                                <input type="file" id="ws-add-source-btn" class="hidden" accept=".pdf,.doc,.docx,.md,.txt" multiple>
                            </label>
                            <div id="ws-upload-progress" class="text-xs text-blue mt-2 hidden">Uploading...</div>
                        </div>
                        
                        <div class="mt-6 pt-4 border-t">
                            <div class="text-sm font-semibold text-dark mb-2">Overall Progress</div>
                            <div class="progress-bar-bg rounded-full h-2 mb-1">
                                <div class="progress-bar-fill rounded-full h-2 bg-blue transition-all" id="ws-progress-fill" style="width: 0%"></div>
                            </div>
                            <div class="flex justify-between text-xs text-gray">
                                <span id="ws-progress-percent">0%</span>
                                <span id="ws-progress-count">0/16</span>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </template>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
